<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给陕西的妳 · 生日快乐</title>
    <style>
        /* 全局样式保持不变... */
        
        /* ========== 彩蛋页面 - 强制可滑动版 ========== */
        #secret-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(255, 240, 245, 0.98);
            z-index: 2000;
            overflow-y: scroll;  /* 强制显示滚动条 */
            -webkit-overflow-scrolling: touch;
            padding: 10px;
        }
        
        .secret-container {
            max-width: 800px;
            margin: 10px auto;
            padding: 40px 30px 100px;  /* 底部加超长padding */
            background: white;
            border: 3px solid #d4af37;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(210, 180, 140, 0.3);
            min-height: 110vh;  /* 强制比屏幕高，产生滚动 */
        }
        
        .page-content {
            min-height: 350px;  /* 固定最小高度 */
            padding: 30px;
            background: #fff9fb;
            border-radius: 20px;
            margin: 30px 0;
            font-size: 18px;
            line-height: 1.8;
            white-space: pre-line;
            border: 1px solid #d4af37;
        }
        
        /* 底部图片区域 - 加大间距 */
        .bottom-image {
            margin: 50px 0 30px;
            text-align: center;
        }
        
        /* 骰子区域 - 加大间距 */
        .dice-container {
            text-align: center;
            margin: 50px 0 40px;
        }
        
        /* 返回按钮区域 - 加大底部间距 */
        .back-link {
            margin: 40px 0 60px;
        }
        
        /* 强制增加一个空白区域 */
        .force-scroll {
            height: 200px;
            width: 100%;
            opacity: 0;
        }
        
        /* 音乐播放器保持不变 */
        .music-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            background: #d4af37;
            border-radius: 50px;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 3000;  /* 比彩蛋页面高 */
            border: 2px solid #b8860b;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 音乐播放器 -->
    <div class="music-player" id="musicToggle">
        <span class="music-icon" id="musicIcon">🔈</span>
        <span id="musicText">点击播放 · 求婚</span>
    </div>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- 主页面（内容不变）... -->
    <div id="main-page">
        <!-- ... 你的主页面内容 ... -->
    </div>

    <!-- 彩蛋页面 - 强制可滑动版 -->
    <div id="secret-page">
        <div class="secret-container">
            <h2 style="color:#b8860b;">💌 给妳的悄悄话</h2>
            
            <div id="pageContent" class="page-content"></div>
            
            <div id="pageIndicator" class="page-indicator">第 1 / 3 页</div>
            
            <div class="pagination">
                <button class="page-btn" id="prevPage" onclick="changePage(-1)" disabled>← 上一页</button>
                <button class="page-btn" id="nextPage" onclick="changePage(1)">下一页 →</button>
            </div>
            
            <!-- 底部图片（最后一页显示） -->
            <div id="bottomImage" class="bottom-image" style="display: none;">
                <img src="images/last.jpg" alt="送你的图" style="max-width:100%; border-radius:20px; border:3px solid #d4af37;">
                <p style="margin-top:10px; color:#b8860b;">送给你 ❤️</p>
            </div>
            
            <!-- 骰子（最后一页显示） -->
            <div id="diceArea" class="dice-container" style="display: none;">
                <div class="dice" id="dice" onclick="rollDice()">?</div>
                <div class="dice-message">点击掷骰子，只能点2次哦</div>
            </div>
            
            <!-- 返回按钮 -->
            <div style="text-align:center;">
                <button class="back-link" onclick="closeSecretPage()">返回主页面</button>
            </div>
            
            <!-- 超级占位符 - 确保一定能滑动 -->
            <div class="force-scroll"></div>
            <div style="height: 150px; opacity: 0;"></div>
        </div>
    </div>

    <script>
        // ==================== 彩蛋内容 ====================
        const secretPages = [
            `从逆水寒里偶然相遇的那天起，我就知道，这个游戏不一样了。

2025年3月末，我们在逆水寒里结为情缘。那时候只是偶尔上线，看看风景，做做任务。我没想到，这会是一切的开始。

后来加了微信，从那天起，每一天都在聊天。游戏、王者、听歌、哲学、历史、抽象小视频、吃的、梦……什么都聊。连我自己都愣住了，原来我们已经聊了这么久，说了这么多话。

你总说我是个大大咧咧的人，什么都不往心里去。是啊，我确实是这样。但和你有关的每一件事，我都记得。`,
        
            `2026年1月19日，麦迪逊时间晚上8点多，我们在一起了。

虽然隔着整个太平洋，你在白天，我在黑夜，但感觉你就在身边。

这两个多月，每一天都很开心。虽然不能见面，虽然有时差，但我们总是能找到时间说话。你心思细腻敏感，我大大咧咧，但我们互补得刚刚好。

我想过很多次，见面后要做什么。一起吃顿饭，一起过下一次生日，一起去K歌，去游乐园，放烟花，一起做饭。`,
        
            `今天是2026年3月28日，你的生日。

第一个不能陪你过的生日，但不会是最后一个。

等我们见面，等我们不再异地，以后的每一个生日，我都要在你身边。

给你买蛋糕，给你唱生日歌，给你吹蜡烛，给你拍好多好多照片。

等我，很快的。

爱你的 孙培源
2026.03.13 于威斯康辛·麦迪逊`
        ];
        
        let currentPage = 1;
        const totalPages = 3;
        let diceClickCount = 0;
        const diceNumbers = [521, 1314, 520, 131.4];
        
        // ==================== 打开/关闭彩蛋 ====================
        function openSecretPage() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('secret-page').style.display = 'block';
            currentPage = 1;
            updatePageContent();
            
            // 强制滚动到顶部
            setTimeout(() => {
                document.getElementById('secret-page').scrollTop = 0;
            }, 100);
        }
        
        function closeSecretPage() {
            document.getElementById('secret-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
        }
        
        // ==================== 翻页 ====================
        function updatePageContent() {
            document.getElementById('pageContent').innerText = secretPages[currentPage - 1];
            document.getElementById('pageIndicator').innerText = `第 ${currentPage} / ${totalPages} 页`;
            
            document.getElementById('prevPage').disabled = (currentPage === 1);
            document.getElementById('nextPage').disabled = (currentPage === totalPages);
            
            // 最后一页显示图片和骰子
            if (currentPage === totalPages) {
                document.getElementById('bottomImage').style.display = 'block';
                document.getElementById('diceArea').style.display = 'block';
            } else {
                document.getElementById('bottomImage').style.display = 'none';
                document.getElementById('diceArea').style.display = 'none';
            }
            
            // 翻页后强制滚动到顶部
            setTimeout(() => {
                document.getElementById('secret-page').scrollTop = 0;
            }, 50);
        }
        
        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                updatePageContent();
            }
        }
        
        // ==================== 骰子 ====================
        function rollDice() {
            if (diceClickCount >= 2) {
                alert('你已经点过两次啦！');
                return;
            }
            
            diceClickCount++;
            const dice = document.getElementById('dice');
            const randomIndex = Math.floor(Math.random() * diceNumbers.length);
            const number = diceNumbers[randomIndex];
            
            dice.innerText = number % 1 === 0 ? number : number.toFixed(1);
            
            if (diceClickCount === 2) {
                dice.classList.add('used');
            }
        }
        
        // ==================== 音乐 ====================
        function setupMusic() {
            const music = document.getElementById('bgMusic');
            const toggle = document.getElementById('musicToggle');
            const icon = document.getElementById('musicIcon');
            const text = document.getElementById('musicText');
            let isPlaying = false;
            
            music.volume = 0.5;
            
            toggle.addEventListener('click', function() {
                if (isPlaying) {
                    music.pause();
                    icon.innerText = '🔈';
                    text.innerText = '点击播放 · 求婚';
                } else {
                    music.play()
                        .then(() => {
                            icon.innerText = '🔊';
                            text.innerText = '播放中 · 求婚';
                        })
                        .catch(e => {
                            alert('点击播放音乐～');
                        });
                }
                isPlaying = !isPlaying;
            });
        }
        
        // ==================== 加载页 ====================
        function setupLoading() {
            const loading = document.querySelector('.loading-page');
            if (loading) {
                setTimeout(() => {
                    loading.style.transition = 'opacity 2s';
                    loading.style.opacity = '0';
                    setTimeout(() => {
                        loading.style.display = 'none';
                    }, 2000);
                }, 3000);
            }
        }
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            setupMusic();
            setupLoading();
            document.getElementById('pageContent').innerText = secretPages[0];
        });
    </script>
</body>
</html>
